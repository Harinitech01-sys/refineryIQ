<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome Page</title>
  <style>
    /* Reset default margin and make full-screen */
    html, body {
      margin: 0;
      padding: 0;
      height: 70%;
      font-family: Arial, sans-serif;
    }

    /* Hero section full screen with background */
    .hero {
      height: 100vh; /* full viewport height */
      width: 100%;
      background-image: url('pink-white-floral.jpg'); /* put your image in the same folder */
      background-size: cover;       /* fill the screen */
      background-position: center;  /* center image */
      background-repeat: no-repeat; /* don't repeat */
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    /* Optional dark overlay to make text visible */
    .overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.25); /* slight dark overlay */
      z-index: 1;
    }

    /* Content above overlay */
    .hero-content {
      position: relative;
      z-index: 2;
      color: #fff;
      max-width: 90%;
    }

    h1 {
      font-size: 3rem;
      margin: 0;
      text-shadow: 2px 2px 6px rgba(0,0,0,0.5);
    }

    p {
      font-size: 1.5rem;
      text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    }

    /* Responsive for smaller screens */
    @media (max-width: 768px) {
      h1 { font-size: 2rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>
  <div class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      
    </div>
  </div>
</body>
</html>
