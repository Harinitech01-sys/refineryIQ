<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Refinery IQ | Access Portal</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Montserrat:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-deep: #050a07;
            --gold-premium: #f7e7ce;
            --gold-deep: #d4af37;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-deep);
            background: radial-gradient(circle at center, #0a1f13 0%, #050a07 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #e0e7e1;
            overflow: hidden;
        }

        /* Background Visuals to match index.html */
        .visuals {
            position: absolute;
            inset: 0;
            background: radial-gradient(circle at 10% 20%, #1b3022 0%, transparent 40%),
                        radial-gradient(circle at 90% 80%, #2d4536 0%, transparent 40%);
            z-index: -1;
            filter: blur(60px);
            opacity: 0.6;
        }

        .login-card {
            background: var(--glass-bg);
            backdrop-filter: blur(30px);
            padding: 50px 40px;
            border-radius: 40px;
            border: 1px solid var(--glass-border);
            width: 100%;
            max-width: 450px;
            text-align: center;
            box-shadow: 0 50px 100px rgba(0,0,0,0.8);
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--gold-premium);
            letter-spacing: 6px;
            text-transform: uppercase;
            font-size: 1.6rem;
            margin-bottom: 10px;
        }

        p {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 40px;
        }

        .portal-options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 15px;
            border: 1px solid var(--glass-border);
            background: rgba(255,255,255,0.05);
            color: white;
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: var(--transition);
            text-decoration: none;
            display: block;
        }

        .btn:hover {
            background: var(--gold-premium);
            color: #050a07;
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(247, 231, 206, 0.1);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--gold-premium) 0%, var(--gold-deep) 100%);
            color: #050a07;
            border: none;
        }

        .footer-tag {
            margin-top: 30px;
            font-size: 9px;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="visuals"></div>

    <div class="login-card">
        <h1>REFINERY | IQ</h1>
        <p>Intelligence Meets Sustainability</p>

        <div class="portal-options">
            <a href="/predictor" class="btn btn-primary">🧠 AI Prediction Engine</a>
            
            <a href="/seller" class="btn">🏪 Feedstock Seller Portal</a>
            
            <a href="/buyer" class="btn">🛒 Biodiesel Buyer Market</a>
        </div>

        <div class="footer-tag">SECURE BIODIESEL OPERATING SYSTEM v3.0</div>
    </div>
</body>
</html>
